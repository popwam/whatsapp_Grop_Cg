<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>منظم دخول جروبات واتساب</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-blur bg-blur-1"></div>
  <div class="bg-blur bg-blur-2"></div>

  <main class="app-shell">
    <section class="card">
      <div class="topbar">
        <div>
          <h1>منظم دخول جروبات واتساب</h1>
          <p class="subtitle">
            يتم تحميل الملف تلقائيًا من:
            <span class="chip">whatsapp.xlsx</span>
          </p>
        </div>

        <button id="themeToggle" class="ghost-btn" type="button">تبديل الوضع</button>
      </div>

      <div id="fileStatus" class="status-box muted">
        جاري تحميل ملف الجروبات...
      </div>

      <div class="upload-actions" style="margin-top:16px;">
        <button id="reloadFileBtn" class="secondary-btn" type="button">إعادة تحميل الملف</button>
        <button id="clearAllBtn" class="danger-btn" type="button">مسح التقدم المحفوظ</button>
      </div>

      <div id="mainSection" class="hidden" style="margin-top:18px;">
        <div class="stats-grid">
          <div class="stat-box">
            <span class="stat-label">الحالي</span>
            <strong id="currentNumber">0</strong>
          </div>
          <div class="stat-box">
            <span class="stat-label">الإجمالي</span>
            <strong id="totalNumber">0</strong>
          </div>
          <div class="stat-box">
            <span class="stat-label">المتبقي</span>
            <strong id="remainingNumber">0</strong>
          </div>
          <div class="stat-box">
            <span class="stat-label">المكتمل</span>
            <strong id="doneNumber">0</strong>
          </div>
        </div>

        <div class="progress-wrap">
          <div class="progress-head">
            <span>التقدم</span>
            <span id="progressText">0%</span>
          </div>
          <div class="progress-bar">
            <div id="progressFill" class="progress-fill"></div>
          </div>
        </div>

        <div class="group-card">
          <div class="group-avatar" id="groupAvatar">W</div>

          <div class="group-content">
            <div class="group-badge" id="groupStep">جروب 0 من 0</div>
            <h2 id="groupName">—</h2>
            <p id="groupLink" class="group-link">—</p>
          </div>
        </div>

        <div class="action-grid">
          <button id="openBtn" class="primary-btn" type="button">الانضمام للمجموعة</button>

          <button id="doneBtn" class="success-btn hidden" type="button">تم الدخول</button>
          <button id="retryBtn" class="warning-btn hidden" type="button">لم أدخل</button>
          <button id="skipBtn" class="secondary-btn hidden" type="button">تخطي مؤقت</button>

          <button id="backBtn" class="ghost-btn" type="button">رجوع خطوة</button>
          <button id="restartBtn" class="danger-btn" type="button">إعادة البدء</button>
        </div>

        <div id="messageBox" class="message-box">
          اضغط <b>الانضمام للمجموعة</b> أولًا، وبعد الرجوع ستظهر لك الخيارات التالية.
        </div>

        <div id="completedSection" class="completed-box hidden">
          <h3>تم الانتهاء من كل الجروبات 🎉</h3>
          <p>كل العناصر تم تعليمها كمكتملة.</p>
          <button id="restartAfterDoneBtn" class="primary-btn" type="button">إعادة البدء من أول جروب</button>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
